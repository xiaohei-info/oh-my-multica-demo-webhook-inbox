pr_base: main
summary: >
  Fix the remaining flaky full-suite concurrency failure. On a fresh database,
  24 connections racing to run PRAGMA journal_mode=WAL convoy on the
  journal-mode-change lock and exceed the busy budget, raising
  "database is locked" and tripping the barrier. Set busy_timeout before the
  first lock-taking op, serialize the one-time WAL + schema init with a module
  lock, pass an explicit connect timeout, and close per-thread connections in
  the test. PR #4 updated (commit 33e079d).
