- id: persistence-and-dedup
  worker: codex-ubuntu-newapi
  blocked_by:
  - shared-domain-foundation
  work_item_id: null
  status: blocked
  title: Implement service authentication, JSON validation, and SQLite deduplication
  description: Implement the framework-free service and repository behavior against
    the shared contracts.
  reviewer: claude-macmini
  contract:
    objective: Verify HMAC before JSON parsing, reject invalid JSON, and persist accepted
      events atomically with exact-byte transaction-safe deduplication.
    acceptance:
    - flow-receive-valid-webhook
    - flow-reject-missing-signature
    - flow-reject-invalid-signature
    - flow-idempotent-duplicate
    - flow-conflict-different-body
    non_goals:
    - Do not add FastAPI request handling, HTTP exception mapping, or bounded body
      streaming.
    - Do not use an in-memory mutex or a digest as the deduplication authority.
    - Do not move HMAC comparison, JSON parsing, or transaction SQL into the API layer.
    verification_commands:
    - python -m pytest --cov=src.service --cov=src.repository --cov-report=term-missing
      --cov-fail-under=90 tests/test_service.py tests/test_repository.py
    - ruff check src tests
    - ruff format --check src tests
    - python -m mypy src
    integration_gates:
    - name: service-auth-and-dedup-gate
      layer: L1
      source_of_truth:
      - AITEAM-787 design: service.verify_signature, service.receive_event, and Dedup
          logic
      delivery_goal: Service-level authentication and JSON validation precede one
        authoritative SQLite dedup transaction.
      covers:
      - constant-time-hmac-verification
      - verify-before-json-ordering
      - invalid-json-rejection
      - exact-byte-deduplication
      - primary-key-conflict-resolution
      acceptance_refs:
      - flow-receive-valid-webhook
      - flow-reject-missing-signature
      - flow-reject-invalid-signature
      - flow-idempotent-duplicate
      - flow-conflict-different-body
      commands:
      - python -m pytest --cov=src.service --cov=src.repository --cov-report=term-missing
        --cov-fail-under=90 tests/test_service.py tests/test_repository.py
      required_metrics:
        coverage_percent: 90
      artifacts: []
    pr_base: main
    source_of_truth:
    - AITEAM-787 design: Core data, Dedup logic, service.verify_signature, service.receive_event,
        and repository.upsert_event
    - AITEAM-788 acceptance document: flow-receive-valid-webhook, flow-reject-missing-signature,
        flow-reject-invalid-signature, flow-idempotent-duplicate, and flow-conflict-different-body
    scope_paths:
    - src/repository.py
    - src/service.py
    - tests/test_repository.py
    - tests/test_service.py
- id: http-api-and-errors
  worker: codex-macmini-newapi
  blocked_by:
  - shared-domain-foundation
  work_item_id: null
  status: blocked
  title: Implement FastAPI boundary, bounded reads, and stable errors
  description: Implement the HTTP adapter against the service contract, using fakes
    only to isolate API unit tests.
  reviewer: hermes-reviewer
  contract:
    objective: Deliver POST, GET, and health routes with bounded raw-body reading,
      header extraction, and documented HTTP response mapping.
    acceptance:
    - flow-reject-missing-signature
    - flow-reject-invalid-signature
    - flow-reject-missing-event-id
    - flow-body-too-large
    - flow-get-event
    - flow-get-event-not-found
    - flow-health
    - flow-health-db-unhealthy
    non_goals:
    - Do not execute SQL, compare HMAC values, or parse webhook JSON in the API layer.
    - Do not parse JSON before enforcing the 1 MiB raw-body limit.
    - Do not log webhook secrets, signature headers, or full payloads.
    verification_commands:
    - python -m pytest --cov=src.api --cov-report=term-missing --cov-fail-under=90
      tests/test_api.py
    - ruff check src tests
    - ruff format --check src tests
    - python -m mypy src
    integration_gates:
    - name: http-boundary-contract-gate
      layer: L1
      source_of_truth:
      - AITEAM-787 design: api.read_limited_body and Stable error JSON shape
      delivery_goal: HTTP inputs are bounded and documented service outcomes map to
        stable API responses.
      covers:
      - bounded-streaming-body-read
      - error-response-mapping
      - event-retrieval-and-health
      acceptance_refs:
      - flow-reject-missing-signature
      - flow-reject-invalid-signature
      - flow-reject-missing-event-id
      - flow-body-too-large
      - flow-get-event
      - flow-get-event-not-found
      - flow-health
      - flow-health-db-unhealthy
      commands:
      - python -m pytest --cov=src.api --cov-report=term-missing --cov-fail-under=90
        tests/test_api.py
      required_metrics:
        coverage_percent: 90
      artifacts: []
    pr_base: main
    source_of_truth:
    - GOAL.md#product-scope
    - AITEAM-787 design: Module boundary, api.read_limited_body, and Stable error
        JSON shape
    - AITEAM-788 acceptance document: HTTP acceptance flows
    scope_paths:
    - src/api.py
    - tests/test_api.py
